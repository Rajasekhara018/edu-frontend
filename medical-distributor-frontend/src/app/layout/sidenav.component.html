<div class="sidenav">
  <div class="brand">
    <div class="brand-title">MedDistributor ERP</div>
    <div class="brand-subtitle">Sales · Inventory · Finance</div>
  </div>
  <mat-nav-list>
    <a mat-list-item *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active-link">
      <mat-icon>{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </a>
  </mat-nav-list>
</div>
