<mat-toolbar class="topbar">
  <div class="topbar-brand">
    <div class="brand-title">MedDistributor ERP</div>
    <div class="brand-subtitle">HQ • Bengaluru • Operations cockpit</div>
  </div>

  <div class="topbar-search">
    <mat-icon>search</mat-icon>
    <input matInput placeholder="Search customer, invoice, SKU, order..." />
  </div>

  <div class="topbar-metrics">
    <div class="metric-card" *ngFor="let metric of metrics">
      <span class="metric-label">{{ metric.label }}</span>
      <strong>{{ metric.value }}</strong>
      <small>{{ metric.note }}</small>
    </div>
  </div>

  <div class="topbar-actions">
    <button mat-stroked-button color="primary">Refresh status</button>
    <button mat-flat-button>New dispatch</button>
  </div>

  <span class="topbar-spacer"></span>

  <div class="topbar-meta">Branch: HQ</div>
  <button mat-icon-button aria-label="Notifications">
    <mat-icon>notifications</mat-icon>
  </button>
  <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item>Profile</button>
    <button mat-menu-item>Preferences</button>
    <button mat-menu-item>Sign out</button>
  </mat-menu>
</mat-toolbar>
