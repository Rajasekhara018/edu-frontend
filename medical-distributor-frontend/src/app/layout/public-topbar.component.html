<header class="public-topbar">
  <div class="top-row">
    <div class="brand">
      <div class="brand-title">MedDistributor ERP</div>
      <div class="brand-subtitle">Wholesale pharmaceutical storefront</div>
    </div>

    <div class="search">
      <mat-icon>search</mat-icon>
      <input
        matInput
        [(ngModel)]="search"
        (ngModelChange)="onSearchChange($event)"
        placeholder="Search products, SKU, manufacturer"
      />
    </div>

    <div class="actions">
      <a mat-button routerLink="/shop">Products</a>
      <a mat-stroked-button routerLink="/shop/checkout">Checkout</a>
      <a mat-flat-button color="primary" routerLink="/login">Sign in</a>
      <a
        class="about-link"
        mat-button
        routerLink="/shop"
        fragment="about"
        (click)="$event.stopPropagation()"
      >
        About us
      </a>
      <button mat-icon-button (click)="toggleTheme()" aria-label="Toggle theme">
        <mat-icon>{{ isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button mat-button [matMenuTriggerFor]="profileMenu">
        <mat-icon>account_circle</mat-icon>
        Profile
      </button>
    </div>
    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item (click)="openOrders()">
        <mat-icon>inventory_2</mat-icon>
        <span>Orders</span>
      </button>
      <button mat-menu-item (click)="openReturns()">
        <mat-icon>keyboard_return</mat-icon>
        <span>Returns</span>
      </button>
      <button mat-menu-item (click)="goToProfile('profile')">
        <mat-icon>person</mat-icon>
        <span>Profile overview</span>
      </button>
      <button mat-menu-item (click)="openSettings()">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item (click)="toggleTheme(!isDark)">
        <mat-icon>{{ isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ isDark ? 'Switch to light' : 'Switch to dark' }}</span>
      </button>
    </mat-menu>
  </div>

  <div class="nav-row">
    <nav>
      <a routerLink="/shop" routerLinkActive="active">Home</a>
      <a routerLink="/shop" routerLinkActive="active">Products</a>
      <a routerLink="/shop" fragment="about">About</a>
      <a routerLink="/shop" fragment="support">Support</a>
    </nav>
    <div class="category-links">
      <button *ngFor="let category of categories" mat-stroked-button>
        {{ category }}
      </button>
    </div>
  </div>

  <div class="feature-row">
    <span *ngFor="let feature of features">{{ feature }}</span>
    <div class="spacer"></div>
    <div class="cart-summary" *ngIf="summary$ | async as summary" (click)="goToCheckout()" role="button" tabindex="0">
      <mat-icon matBadge="{{ summary.count }}" matBadgeColor="primary">shopping_cart</mat-icon>
      <div class="cart-meta">
        <div class="label">Cart Total</div>
        <div class="value">{{ summary.total | currency:'INR':'code':'1.0-2' }}</div>
      </div>
    </div>
  </div>
</header>
