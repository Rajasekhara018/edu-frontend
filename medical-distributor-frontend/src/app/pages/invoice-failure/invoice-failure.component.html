<section class="invoice-panel failure-panel">
  <header class="panel-header">
    <div>
      <p class="eyebrow">Invoice Exception</p>
      <h2>Payment Not Cleared</h2>
    </div>
    <div class="status-pill failure">
      <span>Action required</span>
    </div>
  </header>

  <div class="failure-meta">
    <p>
      Invoice <strong>{{ failure.attempt }}</strong> attempted on <strong>{{ failure.date }}</strong>
      was not accepted because <strong>{{ failure.reason }}</strong>.
    </p>
    <p>
      Reach out to <strong>{{ failure.support }}</strong> or choose a recovery path below.
    </p>
  </div>

  <div class="recovery-options">
    <div class="option" *ngFor="let option of recoveryOptions">
      <div class="option-icon">↺</div>
      <div>
        <p>{{ option }}</p>
      </div>
    </div>
  </div>

  <footer class="panel-footer">
    <button mat-stroked-button color="primary">Share updated payment details</button>
    <button mat-flat-button color="warn">Escalate to support</button>
  </footer>
</section>
