<header class="mega-header">
  <div class="top-bar">
    <div class="brand" [attr.aria-label]="salesConfig.salesConfig.branding.name + ' home'">
      <div class="logo-mark">{{ salesConfig.salesConfig.branding.logoMark }}</div>
      <div class="logo-text">{{ salesConfig.salesConfig.branding.logoText }}<span class="logo-dot">{{ salesConfig.salesConfig.branding.logoDot }}</span></div>
    </div>

    <button class="location" type="button">
      <span class="loc-line">
        <span class="loc-dot"></span>
        {{ salesConfig.salesConfig.branding.locationLabel }}
      </span>
      <span class="loc-action">{{ salesConfig.salesConfig.branding.locationAction }}</span>
    </button>

    <div class="search">
      <label class="sr-only" for="product-search">Search products</label>
      <select aria-label="Search category">
        <option *ngFor="let category of salesConfig.salesConfig.searchCategories">{{ category }}</option>
      </select>
      <input id="product-search" type="text" [placeholder]="salesConfig.salesConfig.branding.searchPlaceholder" />
      <button class="search-btn" type="button" aria-label="Search">
        <span class="search-icon"></span>
      </button>
    </div>

    <div class="header-actions">
      <button class="lang" type="button" aria-label="Language">
        <span class="flag"></span>
        EN
      </button>
      <button class="account" type="button">
        <span class="small">{{ salesConfig.salesConfig.branding.accountGreeting }}</span>
        <span class="strong">{{ salesConfig.salesConfig.branding.accountLabel }}</span>
      </button>
      <button class="orders" type="button">
        <span class="small">{{ salesConfig.salesConfig.branding.ordersSmall }}</span>
        <span class="strong">{{ salesConfig.salesConfig.branding.ordersLabel }}</span>
      </button>
      <button class="cart" type="button" (click)="goToCart()">
        <span class="cart-icon"></span>
        <span class="cart-count">{{ (cartCount$ | async) || 0 }}</span>
        Cart
      </button>
    </div>

    <button class="mobile-cart" type="button" (click)="goToCart()" aria-label="Open cart">
      <span class="cart-icon"></span>
      <span class="cart-count">{{ (cartCount$ | async) || 0 }}</span>
    </button>

    <button class="hamburger" type="button" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="nav-bar">
    <button class="menu-all" type="button">
      <span class="menu-icon"><span></span></span>
      All
    </button>
    <nav class="nav-links">
      <a href="#products" *ngFor="let link of salesConfig.salesConfig.navLinks">{{ link }}</a>
    </nav>
    <div class="promo">
      <span>{{ salesConfig.salesConfig.promoMessages[0] }}</span>
      <span class="promo-sep">|</span>
      <span>{{ salesConfig.salesConfig.promoMessages[1] }}</span>
    </div>
  </div>

  <div *ngIf="isMobileMenuOpen" class="mobile-panel">
    <div class="mobile-search">
      <input type="text" [placeholder]="salesConfig.salesConfig.branding.searchPlaceholder" />
      <button type="button">Search</button>
    </div>
    <div class="mobile-links">
      <a href="#products" (click)="closeMenu()" *ngFor="let link of salesConfig.salesConfig.mobileLinks">{{ link }}</a>
      <a href="#" (click)="goToCart()">Cart</a>
    </div>
  </div>
</header>
