<div class="app-shell" [class.dark-theme]="themeService.themeType === 'dark_mode'">
  <ng-container *ngIf="showWorkspaceShell; else publicView">
    <div class="workspace-shell">
      <app-header></app-header>
      <div class="workspace-frame">
        <aside class="workspace-sidebar">
          <app-sidenav></app-sidenav>
        </aside>
        <main class="workspace-content">
          <router-outlet></router-outlet>
        </main>
      </div>
    </div>
  </ng-container>

  <ng-template #publicView>
    <div class="public-shell">
      <router-outlet></router-outlet>
    </div>
  </ng-template>
</div>
<div class="toast-stack" aria-live="polite" aria-atomic="true">
  <div
    *ngFor="let toast of this.postService.toastMessages; trackBy: trackById"
    class="app-toast"
    [ngClass]="{
      'app-toast--success': toast.type === 'success',
      'app-toast--error': toast.type === 'error',
      'app-toast--warn': toast.type === 'warn',
      'app-toast--info': toast.type === 'info'
    }"
    role="alert">
    <div class="app-toast__icon">
      <i
        class="bi"
        [ngClass]="{
          'bi-check2-circle': toast.type === 'success',
          'bi-x-octagon': toast.type === 'error',
          'bi-exclamation-diamond': toast.type === 'warn',
          'bi-info-circle': toast.type === 'info'
        }"></i>
    </div>

    <div class="app-toast__body">
      <div class="app-toast__meta">
        <div class="app-toast__title">
          {{ toast.type === 'success' ? 'Success' : toast.type === 'warn' ? 'Attention' : toast.type === 'info' ? 'Update' : 'Action needed' }}
        </div>
        <span class="app-toast__badge">
          {{ toast.type === 'success' ? 'Completed' : toast.type === 'warn' ? 'Review' : toast.type === 'info' ? 'Notice' : 'Attention' }}
        </span>
      </div>
      <p>{{ toast.text }}</p>
    </div>

    <button
      type="button"
      class="app-toast__close"
      aria-label="Dismiss notification"
      (click)="postService.removeToast(toast.id)">
      <i class="bi bi-x-lg"></i>
    </button>

    <span class="app-toast__progress"></span>
  </div>
</div>
