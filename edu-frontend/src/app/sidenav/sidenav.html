<div class="nav-shell" [ngClass]="postService.isCollapsed ? 'nav-collapsed' : 'nav-expanded'">
    <div class="nav-head">
        <div class="brand-mark">E</div>
        <div class="brand-copy" *ngIf="!postService.isCollapsed">
            <span class="brand-eyebrow">Operator suite</span>
            <strong>Edu Console</strong>
        </div>
    </div>
    <div class="nav-context" *ngIf="!postService.isCollapsed">
        <span class="nav-context-label">Signed in</span>
        <strong>{{ userName || 'Operator' }}</strong>
        <p>Payments, customer lookup, and reconciliation from one workspace.</p>
    </div>

    <div class="nav-body" [ngStyle]="{
           'background-image': 'url(' + backgroundImageUrl + ')',
           'background-size': 'cover',
           'background-position': 'center',
           'background-repeat': 'no-repeat'
         }">
        <div class="nav-section-label" *ngIf="!postService.isCollapsed">Navigation</div>
            <mat-list>
                <mat-list-item *ngFor="let item of filteredNavItems" [routerLink]="[item.route]" [routerLinkActive]="'link-active'"
                [matTooltip]="postService.isCollapsed ? item.tooltip : ''" matTooltipPosition="after"
                (click)="storeSelectedMenu(item)">
                <div matListItemTitle class="menu-item d-flex align-items-center">
                    <lucide-icon *ngIf="item.iconType === 'lucide'" [name]="item.icon" class="m-1"
                        size="20"></lucide-icon>
                    <i *ngIf="item.iconType === 'bootstrap'" class="bi {{ item.icon }} fs-5 me-2"></i>
                    <span class="font-medium" *ngIf="!postService.isCollapsed">{{ item.label }}</span>
                </div>
            </mat-list-item>
        </mat-list>
    </div>

    <div class="nav-foot" *ngIf="!postService.isCollapsed">
        <div class="foot-card">
            <span>Today focus</span>
            <strong>Zero failed transactions</strong>
            <p>Keep customer validation and payment execution in one operator cycle.</p>
        </div>
    </div>
</div>
