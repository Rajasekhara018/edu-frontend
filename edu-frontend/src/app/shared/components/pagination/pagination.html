<div class="table-footer">
    <div class="table-footer-left">
        <span class="entries-info">
            Showing {{startIndex }} – {{endIndex}} of {{totalElements}} entries
        </span>
    </div>
    <div class="table-footer-right">
        <div class="pagination-controls">
            <button class="page-btn" (click)="goToPage(1)" [disabled]="currentPage === 1">
                «
            </button>
            <button class="page-btn" (click)="previousPage()" [disabled]="currentPage === 1">
                ‹
            </button>
            <button *ngFor="let page of visiblePages" class="page-btn" [class.active]="page === currentPage"
                (click)="goToPage(page)">
                {{ page }}
            </button>
            <button class="page-btn" (click)="nextPage()" [disabled]="currentPage === totalPages">
                ›
            </button>
            <button class="page-btn" (click)="goToPage(totalPages)" [disabled]="currentPage === totalPages">
                »
            </button>
        </div>
        <div class="page-size">
            <span>Rows</span>
            <select [(ngModel)]="pageSize" (change)="onPageSizeChange()">
                <option *ngFor="let size of pageSizeOptions" [value]="size">
                    {{ size }}
                </option>
            </select>
        </div>
    </div>
</div>
