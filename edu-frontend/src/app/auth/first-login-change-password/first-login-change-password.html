<div class="change-password-page">
  <div class="change-password-card">
    <button class="back-link" type="button" (click)="backToLogin()">
      <i class="bi bi-chevron-left"></i>
      <span>Back</span>
    </button>

    <div class="brand-block">
      <img src="../../../assets/edutech.png" alt="Edu Payments" class="brand-icon" />
      <div>
        <div class="brand-title">Edu Payments</div>
        <div class="brand-subtitle">First sign-in security setup</div>
      </div>
    </div>

    <div class="copy-block">
      <h1>Change password</h1>
      <p>Create a new password before entering the workspace.</p>
      <strong *ngIf="userName" class="account-chip">{{ userName }}</strong>
    </div>

    <div *ngIf="feedback" class="feedback" [ngClass]="feedbackTone === 'success' ? 'feedback-success' : 'feedback-error'">
      <i class="bi" [ngClass]="feedbackTone === 'success' ? 'bi-check-circle' : 'bi-exclamation-triangle'"></i>
      <span>{{ feedback }}</span>
    </div>

    <form class="change-form" #changePasswordForm="ngForm" (keydown.enter)="$event.preventDefault()">
      <label class="form-field">
        <span>Current Password</span>
        <div class="password-field">
          <input [type]="showCurrentPassword ? 'text' : 'password'" class="form-control with-toggle" name="currentPassword" [(ngModel)]="currentPassword" required minlength="8" />
          <button class="password-toggle" type="button" (click)="showCurrentPassword = !showCurrentPassword" [attr.aria-label]="showCurrentPassword ? 'Hide current password' : 'Show current password'">
            <i class="bi" [ngClass]="showCurrentPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
      </label>

      <label class="form-field">
        <span>New Password</span>
        <div class="password-field">
          <input [type]="showNewPassword ? 'text' : 'password'" class="form-control with-toggle" name="newPassword" [(ngModel)]="newPassword" required minlength="8" />
          <button class="password-toggle" type="button" (click)="showNewPassword = !showNewPassword" [attr.aria-label]="showNewPassword ? 'Hide new password' : 'Show new password'">
            <i class="bi" [ngClass]="showNewPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <small>Use at least 8 characters and do not reuse the temporary password.</small>
      </label>

      <div class="strength-panel" *ngIf="newPassword">
        <div class="strength-header">
          <span>Password strength</span>
          <strong>{{ strengthLabel }}</strong>
        </div>
        <div class="strength-track">
          <div class="strength-fill" [style.width.%]="strengthPercent" [ngClass]="{
            'strength-weak': strengthScore <= 2,
            'strength-good': strengthScore > 2 && strengthScore < 5,
            'strength-strong': strengthScore === 5
          }"></div>
        </div>
        <div class="check-grid">
          <div class="check-item" *ngFor="let check of passwordChecks" [ngClass]="check.passed ? 'check-pass' : 'check-pending'">
            <i class="bi" [ngClass]="check.passed ? 'bi-check-circle-fill' : 'bi-circle'"></i>
            <span>{{ check.label }}</span>
          </div>
        </div>
      </div>

      <label class="form-field">
        <span>Confirm New Password</span>
        <div class="password-field">
          <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control with-toggle" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="8" />
          <button class="password-toggle" type="button" (click)="showConfirmPassword = !showConfirmPassword" [attr.aria-label]="showConfirmPassword ? 'Hide confirm password' : 'Show confirm password'">
            <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
      </label>

      <button class="submit-btn" type="button" [disabled]="isLoading || !changePasswordForm.form.valid" (click)="submit()">
        <span *ngIf="!isLoading">Change Password</span>
        <span *ngIf="isLoading">Updating...</span>
      </button>
    </form>
  </div>
</div>
