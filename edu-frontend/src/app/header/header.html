<nav class="navbar navbar-expand-lg fixed-top app-header">
    <div class="container-fluid">
        <button class="brand-button" [routerLink]="'/home'">
            <span class="brand-mark">
                <img src="../../../assets/edutech.png" alt="App Logo" class="brand-icon" />
            </span>
            <span class="brand-text">
                <span class="brand-label">Edu Payments</span>
                <strong>Operations Console</strong>
            </span>
        </button>

        <div class="header-summary d-none d-xl-flex">
            <div class="summary-chip">
                <span>Mode</span>
                <strong>Live operations</strong>
            </div>
            <div class="summary-chip">
                <span>Focus</span>
                <strong>Collections and reconciliation</strong>
            </div>
        </div>

        <span class="tou-spacer"></span>

        <div class="header-actions">
            <div class="position-relative">
                <button class="action-button" (click)="toggleNotif()" aria-label="Notifications">
                    <i class="bi bi-bell"></i>
                    <span class="d-none d-md-inline">Alerts</span>
                </button>
                <div *ngIf="showNotif" class="floating-panel notifications-panel">
                    <div class="panel-title">Notifications</div>
                    <p>No new alerts right now. Operational notices will appear here.</p>
                </div>
            </div>

            <div class="position-relative profile-trigger" (click)="toggleProfile()">
                <div class="profile-button">
                    <img [src]="image
            ? 'http://localhost:9000/api/v1/uam/files/profile-image?filename=' + image
            : 'https://i.pravatar.cc/40?u=' + name" alt="Profile Image" class="rounded-circle profile-avatar" width="40" height="40" />
                    <div class="profile-copy d-none d-md-grid text-start">
                        <span class="profile-role">Operator</span>
                        <strong>{{name || 'Operator'}}</strong>
                        <div class="profile-department">{{department || 'Payments desk'}}</div>
                    </div>
                    <i class="bi bi-chevron-down profile-caret d-none d-md-block"></i>
                </div>
                <div *ngIf="showProfile" class="floating-panel profile-panel">
                    <a class="profile-link" routerLink="/profile">
                        <i class="bi bi-person"></i>
                        <span>Profile</span>
                    </a>
                    <a class="profile-link" routerLink="/settings">
                        <i class="bi bi-gear"></i>
                        <span>Settings</span>
                    </a>
                    <a class="profile-link profile-link-danger" (click)="logout()">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>Sign Out</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>
