server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/meddist
    username: meddist
    password: meddist
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc.lob.non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

security:
  jwt:
    issuer: meddist-erp
    secret: ${JWT_SECRET:changeit-changeit-changeit}
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 7

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    root: INFO
    com.meddistributor: INFO
