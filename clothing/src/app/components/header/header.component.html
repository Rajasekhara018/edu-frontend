<header class="mega-header">
  <div class="top-bar">
    <div class="brand" [attr.aria-label]="storeConfig.storeConfig.branding.name + ' home'">
      <div class="logo-mark">{{ storeConfig.storeConfig.branding.logoMark }}</div>
      <div class="logo-text">{{ storeConfig.storeConfig.branding.logoText }}<span class="logo-dot">{{ storeConfig.storeConfig.branding.logoDot }}</span></div>
    </div>

    <button class="location" type="button">
      <span class="loc-line">
        <span class="loc-dot"></span>
        {{ storeConfig.storeConfig.branding.locationLabel }}
      </span>
      <span class="loc-action">{{ storeConfig.storeConfig.branding.locationAction }}</span>
    </button>

    <div class="search">
      <label class="sr-only" for="product-search">Search fashion</label>
      <select aria-label="Search category">
        <option *ngFor="let category of storeConfig.storeConfig.searchCategories">{{ category }}</option>
      </select>
      <input id="product-search" type="text" [placeholder]="storeConfig.storeConfig.branding.searchPlaceholder" />
      <button class="search-btn" type="button" aria-label="Search">
        <span class="search-icon"></span>
      </button>
    </div>

    <div class="header-actions">
      <button class="lang" type="button" aria-label="Language">
        <span class="flag"></span>
        EN
      </button>
      <button class="account" type="button">
        <span class="small">{{ storeConfig.storeConfig.branding.accountGreeting }}</span>
        <span class="strong">{{ storeConfig.storeConfig.branding.accountLabel }}</span>
      </button>
      <button class="orders" type="button">
        <span class="small">{{ storeConfig.storeConfig.branding.ordersSmall }}</span>
        <span class="strong">{{ storeConfig.storeConfig.branding.ordersLabel }}</span>
      </button>
      <button class="cart" type="button" (click)="goToCart()">
        <span class="cart-icon"></span>
        <span class="cart-count">{{ (cartCount$ | async) || 0 }}</span>
        Bag
      </button>
    </div>

    <button class="mobile-cart" type="button" (click)="goToCart()" aria-label="Open cart">
      <span class="cart-icon"></span>
      <span class="cart-count">{{ (cartCount$ | async) || 0 }}</span>
    </button>

    <button class="hamburger" type="button" (click)="toggleMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="nav-bar">
    <button class="menu-all" type="button">
      <span class="menu-icon"><span></span></span>
      Shop
    </button>
    <nav class="nav-links">
      <a *ngFor="let link of storeConfig.storeConfig.navLinks" [href]="link === 'Help' ? '#contact' : (link === 'Style guide' || link === 'Studio notes' ? '#about' : '#products')">{{ link }}</a>
    </nav>
    <div class="promo">
      <span>{{ storeConfig.storeConfig.promoMessages[0] }}</span>
      <span class="promo-sep">|</span>
      <span>{{ storeConfig.storeConfig.promoMessages[1] }}</span>
    </div>
  </div>

  <div *ngIf="isMobileMenuOpen" class="mobile-panel">
    <div class="mobile-search">
      <input type="text" [placeholder]="storeConfig.storeConfig.branding.searchPlaceholder" />
      <button type="button">Search</button>
    </div>
    <div class="mobile-links">
      <a *ngFor="let link of storeConfig.storeConfig.mobileLinks" [href]="link === 'Help' ? '#contact' : (link === 'Style guide' || link === 'Studio notes' ? '#about' : '#products')" (click)="link === 'Bag' ? goToCart() : closeMenu()">{{ link }}</a>
    </div>
  </div>
</header>
